<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#080810"/>
  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#4ecca3" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#grid)"/>
  <!-- Outer glow ring -->
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#4ecca3" stroke-width="1" opacity="0.3" rx="4"/>
  <!-- Corner accents -->
  <path d="M 20 40 L 20 20 L 40 20" fill="none" stroke="#4ecca3" stroke-width="3"/>
  <path d="M 160 20 L 180 20 L 180 40" fill="none" stroke="#4ecca3" stroke-width="3"/>
  <path d="M 180 160 L 180 180 L 160 180" fill="none" stroke="#4ecca3" stroke-width="3"/>
  <path d="M 40 180 L 20 180 L 20 160" fill="none" stroke="#4ecca3" stroke-width="3"/>
  <!-- 4 -->
  <text x="100" y="118" font-family="'Press Start 2P', monospace" font-size="72" fill="#4ecca3" text-anchor="middle" filter="url(#glow4)">4</text>
  <defs>
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- U -->
  <text x="100" y="158" font-family="'Press Start 2P', monospace" font-size="72" fill="#7fc8e8" text-anchor="middle" filter="url(#glowU)">U</text>
  <defs>
    <filter id="glowU" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 2 -->
  <text x="100" y="198" font-family="'Press Start 2P', monospace" font-size="72" fill="#e87ca0" text-anchor="middle" filter="url(#glow2)">2</text>
  <defs>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
