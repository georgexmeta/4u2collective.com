<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <rect width="400" height="80" fill="#080810"/>
  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#4ecca3" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="80" fill="url(#grid)"/>
  <!-- 4U2 -->
  <text x="30" y="58" font-family="'Press Start 2P', monospace" font-size="52" fill="#4ecca3" filter="url(#glow)">4U2</text>
  <!-- Dot separator -->
  <circle cx="165" cy="40" r="5" fill="#e87ca0"/>
  <!-- COLLECTIVE wordmark -->
  <text x="185" y="52" font-family="'Press Start 2P', monospace" font-size="16" fill="#7fc8e8" letter-spacing="4">COLLECTIVE</text>
  <!-- Bottom accent line -->
  <rect x="30" y="70" width="340" height="1" fill="#4ecca3" opacity="0.4"/>
</svg>
